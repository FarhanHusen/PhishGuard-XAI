<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard XAI | Smart Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="main-container">
    <div class="card glass">
        <div class="header-icon">
            <i class="fas fa-shield-virus"></i>
        </div>
        <h1>PhishGuard <span class="accent">XAI</span></h1>
        <p class="subtitle">Analisis keamanan URL secara cerdas dengan XGBoost & Interpretasi SHAP</p>

        <form action="/predict" method="post" class="predict-form">
            <div class="input-group">
                <i class="fas fa-link"></i>
                <input type="text" name="url" placeholder="Masukkan URL untuk dianalisis..." required>
            </div>
            <button type="submit" class="btn-primary">
                <span>Deteksi Sekarang</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>
        
        <div class="info-tip">
            <i class="fas fa-lightbulb"></i>
            <span>Tips: Periksa URL yang menggunakan karakter angka sebagai pengganti huruf.</span>
        </div>

        <div class="footer">
            <p>© 2026 PhishGuard XAI • Keamanan Siber Berbasis AI</p>
        </div>
    </div>
</div>

</body>
</html>
